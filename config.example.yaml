bot_token: "YOUR_BOT_TOKEN_HERE"
prefix: "!"
debug: false
owner_id: "YOUR_DISCORD_USER_ID"

youtube:
  # PO tokens are generated automatically by bgutil-pot (no manual config needed)
  # 'web' provides best audio quality when bgutil attestation is working correctly.
  # If you see "Combined video+audio format selected" warnings (bgutil attestation broken),
  # try "web,android_vr" or just "android_vr" as a fallback — no PO token needed.
  client: "web"

ffmpeg_path: "ffmpeg"

audio:
  sample_rate: 48000
  channels: 2
  frame_duration_ms: 20
  bitrate: 128
