bot_token: "YOUR_BOT_TOKEN_HERE"
prefix: "!"
debug: false
owner_id: "YOUR_DISCORD_USER_ID"

youtube:
  # PO tokens are generated automatically by bgutil-pot (no manual config needed).
  # 'mweb' + bgutil PO tokens (the code sets fetch_pot=always) is the verified working
  # combo as of July 2026: it mints a PLAYER PO token to pass YouTube's bot-check gate
  # and a GVS PO token to unlock audio-only stream URLs.
  # Do NOT use 'android_vr' — YouTube made it login-gated in July 2026 (it now returns
  # "Sign in to confirm you're not a bot" / LOGIN_REQUIRED). 'web' is SABR-only and not
  # usable for piped audio.
  client: "mweb"

  # Optional: path to a Netscape-format cookies file exported from your browser.
  # When set, VISITOR_INFO1_LIVE and SOCS cookies are sent with every yt-dlp request,
  # reducing YouTube bot-detection on residential IPs and unlocking age-restricted content.
  #
  # Export command (run on the host, not inside Docker):
  #   yt-dlp --cookies-from-browser chrome --cookies cookies.txt -o /dev/null -- "https://www.youtube.com"
  # This writes cookies.txt in the current directory.
  # Native: set cookies_file to the local path (e.g. "./cookies.txt").
  # Docker: use "/data/cookies.txt" and mount ./cookies.txt:/data/cookies.txt in docker-compose.yml.
  # Re-export every ~4 months (VISITOR_INFO1_LIVE expires ~6 months; 150-day warning threshold).
  #
  # cookies_file: "/data/cookies.txt"

# Optional: Spotify support. Track links work WITHOUT credentials (via Spotify's
# public oEmbed). Playlist and album links need API credentials from a free app at
# https://developer.spotify.com/dashboard (Client ID + Client Secret). Spotify audio
# is DRM-protected, so links are resolved to the matching track on YouTube.
# spotify:
#   client_id: "YOUR_SPOTIFY_CLIENT_ID"
#   client_secret: "YOUR_SPOTIFY_CLIENT_SECRET"

ffmpeg_path: "ffmpeg"

audio:
  sample_rate: 48000
  channels: 2
  frame_duration_ms: 20
  bitrate: 128
