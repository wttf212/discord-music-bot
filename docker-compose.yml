version: "3.8"
services:
  music-bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - bot-data:/data
      # Optional: mount a cookies.txt file for YouTube visitor cookie auth (see config.example.yaml)
      # - ./cookies.txt:/data/cookies.txt
    environment:
      - GUILD_SETTINGS_FILE=/data/guild_settings.json

volumes:
  bot-data:
